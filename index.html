<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Questionnaire Library</title>

<script src="https://apis.google.com/js/api.js"></script>

<style>

body{
font-family:Arial;
margin:20px;
background:#f6f6f6;
}

h1{
margin-bottom:10px;
}

#search{
padding:10px;
width:50%;
margin-bottom:20px;
}

.card-container{
display:flex;
flex-wrap:wrap;
gap:15px;
}

.card{
background:white;
border-radius:8px;
padding:15px;
width:280px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card.selected{
border:2px solid #007BFF;
}

button{
padding:6px 10px;
margin-top:8px;
cursor:pointer;
border:none;
border-radius:5px;
background:#007BFF;
color:white;
}

#compare-btn{
margin-top:20px;
padding:10px 15px;
}

#ai-output{
margin-top:30px;
background:white;
padding:20px;
border-radius:8px;
}

table{
border-collapse:collapse;
width:100%;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:left;
}

th{
background:#f1f1f1;
}

/* Modal */

#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

#modal-content{
background:white;
padding:25px;
width:600px;
margin:80px auto;
border-radius:8px;
max-height:70vh;
overflow-y:auto;
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

</style>
</head>

<body>

<h1>Smart Questionnaire Library</h1>

<input type="text" id="search" placeholder="Search questionnaires...">

<div class="card-container" id="cards"></div>

<button id="compare-btn">Compare Selected</button>

<div id="ai-output"></div>


<!-- Modal -->
<div id="modal">
<div id="modal-content">
<span class="close" onclick="closeModal()">✖</span>
<div id="modal-data"></div>
</div>
</div>


<script>

let allCards=[]
let selectedCards=[]

function init(){

gapi.client.init({
apiKey:'YOUR_GOOGLE_API_KEY',
discoveryDocs:['https://sheets.googleapis.com/$discovery/rest?version=v4']
})

.then(()=>gapi.client.sheets.spreadsheets.values.get({

spreadsheetId:'1jhmq563QLivfJvDOIwm8WEI5TBvy8imqrCA-Vmqy-Cc',
range:'Sheet1!A1:R1000'

}))

.then(response=>{

const data=response.result.values
renderCards(data)

})

}

gapi.load('client',init)



function renderCards(data){

const headers=data[0].map(h=>h.trim())

allCards=data.slice(1).map(row=>{
let obj={}
headers.forEach((h,i)=>obj[h]=row[i] || "")
return obj
})

const container=document.getElementById('cards')
container.innerHTML=""

allCards.forEach((item,index)=>{

const card=document.createElement('div')
card.className="card"
card.dataset.index=index

card.innerHTML=`

<strong>${item['Questionaire name']}</strong><br>

${item['Short form of the questionnaire']}<br>

Target Age: ${item['Target age']}<br>

Target Condition: ${item['Target condition']}<br>

<button onclick="viewDetails(${index})">View Details</button>
<button onclick="toggleSelect(this,${index})">Select</button>

`

container.appendChild(card)

})

}



function toggleSelect(btn,index){

const card=btn.parentElement

if(selectedCards.includes(index)){
selectedCards=selectedCards.filter(i=>i!==index)
card.classList.remove('selected')
}
else{
selectedCards.push(index)
card.classList.add('selected')
}

}



function viewDetails(index){

const item=allCards[index]

document.getElementById("modal-data").innerHTML=`

<h2>${item['Questionaire name']}</h2>

<b>Article Source:</b> ${item['Article name from which I got the questionnaire']}<br><br>

<b>Year:</b> ${item['Year of publish']}<br>

<b>Keywords:</b> ${item['Keywords']}<br>

<b>Target Age:</b> ${item['Target age']}<br>

<b>Target Condition:</b> ${item['Target condition']}<br>

<b>Purpose:</b> ${item['Purpose of questionnaire']}<br>

<b>Scale:</b> ${item['Scale of which they and like for eg on a scale of 1-5']}<br>

<b>Validation:</b> ${item['Validation if it’s validated or not']}<br>

<b>Number of Questions:</b> ${item['Number of questions']}<br>

<b>Scoring:</b> ${item['Scoring eg. never= 0 sometimes =1 often = 2 or need to say if it’s a yes/ no qn or what those do qn']}<br>

<b>Conditions to Use:</b> ${item['Condition to use the questionnaire like free paid or need to contact']}<br>

<b>Credit:</b> ${item['Credit in the paper what the website wants us to credit it as']}<br>

<b>Non English Versions:</b> ${item['If there’s a non English frrs']}<br>

<b>Notes:</b> ${item['Notes']}<br><br>

<a href="${item['Sharepoint link to the questionnaire']}" target="_blank">Open Questionnaire</a>

`

document.getElementById("modal").style.display="block"

}



function closeModal(){
document.getElementById("modal").style.display="none"
}



document.getElementById('search').addEventListener('input',function(){

const filter=this.value.toLowerCase()

document.querySelectorAll('.card').forEach(card=>{

const item=allCards[card.dataset.index]
const text=Object.values(item).join(" ").toLowerCase()

card.style.display=text.includes(filter)?"block":"none"

})

})



document.getElementById('compare-btn').addEventListener('click',async function(){

if(selectedCards.length<2){
alert("Select at least 2 questionnaires")
return
}

const compareData=selectedCards.map(i=>{

const item=allCards[i]

return`
Questionnaire: ${item['Questionaire name']}
Target Age: ${item['Target age']}
Target Condition: ${item['Target condition']}
Purpose: ${item['Purpose of questionnaire']}
Questions: ${item['Number of questions']}
Validation: ${item['Validation if it’s validated or not']}
`

}).join("\n\n")

document.getElementById("ai-output").innerHTML="AI comparing..."

const response=await fetch(
"https://ai-server-hub--nayshawadhawan.replit.app/api/ai",
{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({

prompt:`

Compare the following questionnaires.

Return ONLY an HTML table.

Columns must be:

Questionnaire
Target Age
Target Condition
Purpose
Number of Questions
Validation
Best Use Case

${compareData}

`

})
}
)

const data=await response.json()

document.getElementById("ai-output").innerHTML=
data.reply || data.choices?.[0]?.message?.content

})

</script>

</body>
</html>
