<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionnaire Data</title>
    <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
    <h1>Questionnaire Data</h1>
    <div id="data"></div>
    <script>
        function init() {
            gapi.client.init({
                'apiKey': 'AIzaSyCGkFYhViB-DAVCH0RqpyV-Usv5AmgUr_o', 
                'discoveryDocs': ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
            }).then(function () {
                return gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: 'https://docs.google.com/spreadsheets/d/1jhmq563QLivfJvDOIwm8WEI5TBvy8imqrCA-Vmqy-Cc/edit?gid=0#gid=0',  
                });
            }).then(function (response) {
                var data = response.result.values;
                var output = '<ul>';
                for (var i = 0; i < data.length; i++) {
                    output += '<li>' + data[i].join(': ') + '</li>';
                }
                output += '</ul>';
                document.getElementById('data').innerHTML = output;
            }, function (response) {
                console.error('Error: ' + response.result.error.message);
            });
        }
        gapi.load('client', init);
    </script>
</body>
</html>
