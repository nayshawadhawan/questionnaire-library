
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Questionnaire Library</title>

<script src="https://apis.google.com/js/api.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f7f7f7;
}

/* Layout */

.container{
display:flex;
}

/* Sidebar */

.sidebar{
width:240px;
background:white;
padding:20px;
border-right:1px solid #ddd;
height:100vh;
position:sticky;
top:0;
}

.sidebar h3{
margin-top:0;
}

.sidebar input{
width:100%;
padding:6px;
margin-bottom:12px;
}

/* Main */

.main{
flex:1;
padding:20px;
}

/* Cards */

.card-container{
display:flex;
flex-wrap:wrap;
gap:15px;
}

.card{
background:white;
border-radius:8px;
padding:15px;
width:280px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card.selected{
border:2px solid #007BFF;
}

button{
padding:6px 10px;
margin-top:8px;
cursor:pointer;
border:none;
border-radius:5px;
background:#007BFF;
color:white;
}

/* Tags */

.tag{
display:inline-block;
padding:3px 8px;
border-radius:4px;
font-size:12px;
margin-left:6px;
}

.paid{
background:#ff4d4d;
color:white;
}

.free{
background:#2ecc71;
color:white;
}

/* AI */

#ai-output{
margin-top:30px;
background:white;
padding:20px;
border-radius:8px;
}

table{
border-collapse:collapse;
width:100%;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
background:#f1f1f1;
}

/* Modal */

#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

#modal-content{
background:white;
padding:25px;
width:600px;
margin:80px auto;
border-radius:8px;
max-height:70vh;
overflow-y:auto;
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

#ai-chat-box{
margin-top:40px;
background:white;
padding:20px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR FILTERS -->

<div class="sidebar">

<h3>Filters</h3>

<label>Search</label>
<input type="text" id="search">

<label>Target Age</label>
<input type="text" id="filter-age">

<label>Target Condition</label>
<input type="text" id="filter-condition">

<label>Admin (Parent / Child / Proxy)</label>
<input type="text" id="filter-admin">

</div>


<!-- MAIN CONTENT -->

<div class="main">

<h1>Smart Questionnaire Library</h1>

<div class="card-container" id="cards"></div>

<button id="compare-btn">Compare Selected</button>

<div id="ai-output"></div>


<h2>Ask AI about Questionnaires</h2>

<div id="ai-chat-box">

<input id="ai-question"
placeholder="Example: Best questionnaire for children?"
style="width:60%; padding:8px;">

<button onclick="askAI()">Ask AI</button>

<div id="ai-answer" style="margin-top:15px;"></div>

</div>

</div>

</div>



<!-- MODAL -->

<div id="modal">
<div id="modal-content">
<span class="close" onclick="closeModal()">✖</span>
<div id="modal-data"></div>
</div>
</div>



<script>

let allCards=[]
let selectedCards=[]



// GOOGLE SHEETS

function init(){

gapi.client.init({

apiKey:'AIzaSyCGkFYhViB-DAVCH0RqpyV-Usv5AmgUr_o',

discoveryDocs:['https://sheets.googleapis.com/$discovery/rest?version=v4']

})

.then(()=>gapi.client.sheets.spreadsheets.values.get({

spreadsheetId:'1jhmq563QLivfJvDOIwm8WEI5TBvy8imqrCA-Vmqy-Cc',

range:'Sheet1!A1:R1000'

}))

.then(response=>{

const data=response.result.values

renderCards(data)

})

.catch(err=>{

console.error(err)

document.getElementById("cards").innerHTML="Error loading data"

})

}

gapi.load('client',init)



// RENDER

function renderCards(data){

const headers=data[0].map(h=>h.trim())

allCards=data.slice(1).map(row=>{

let obj={}
headers.forEach((h,i)=>obj[h]=row[i] || "")
return obj

})

displayCards(allCards)

}



// DISPLAY

function displayCards(list){

const container=document.getElementById('cards')
container.innerHTML=""

list.forEach((item,index)=>{

const usage=item['Condition to use the questionnaire like free paid or need to contact'] || ""

let tag=""

if(usage.toLowerCase().includes("paid")){
tag=`<span class="tag paid">PAID</span>`
}

else if(usage.toLowerCase().includes("free")){
tag=`<span class="tag free">FREE</span>`
}

const card=document.createElement('div')

card.className="card"
card.dataset.index=index

card.innerHTML=`

<strong>${item['Questionaire name']}</strong> ${tag}<br>

${item['Short form of the questionnaire'] || ""}<br>

Admin: ${item['Administer like who is the audience eg. Parents, child or proxy'] || ""}<br>

Target Age: ${item['Target age'] || ""}<br>

Target Condition: ${item['Target condition'] || ""}<br>

<button onclick="viewDetails(${index})">View Details</button>

<button onclick="toggleSelect(this,${index})">Select</button>

`

container.appendChild(card)

})

}



// FILTERING

document.querySelectorAll("#search,#filter-age,#filter-condition,#filter-admin")
.forEach(input=>{

input.addEventListener("input",applyFilters)

})

function applyFilters(){

const search=document.getElementById("search").value.toLowerCase()
const age=document.getElementById("filter-age").value.toLowerCase()
const condition=document.getElementById("filter-condition").value.toLowerCase()
const admin=document.getElementById("filter-admin").value.toLowerCase()

const filtered=allCards.filter(item=>{

return Object.values(item).join(" ").toLowerCase().includes(search)

&& item['Target age'].toLowerCase().includes(age)

&& item['Target condition'].toLowerCase().includes(condition)

&& item['Administer like who is the audience eg. Parents, child or proxy']
.toLowerCase().includes(admin)

})

displayCards(filtered)

}



// MODAL

function viewDetails(index){

const item=allCards[index]

document.getElementById("modal-data").innerHTML=`

<h2>${item['Questionaire name']}</h2>

<b>Admin:</b> ${item['Administer like who is the audience eg. Parents, child or proxy']}<br>

<b>Target Age:</b> ${item['Target age']}<br>

<b>Target Condition:</b> ${item['Target condition']}<br>

<b>Purpose:</b> ${item['Purpose of questionnaire']}<br>

<b>Questions:</b> ${item['Number of questions']}<br>

<b>Validation:</b> ${item['Validation if it’s validated or not']}<br>

<b>Notes:</b> ${item['Notes']}<br><br>

<a href="${item['Sharepoint link to the questionnaire']}" target="_blank">Open Questionnaire</a>

`

document.getElementById("modal").style.display="block"

}

function closeModal(){
document.getElementById("modal").style.display="none"
}



// SELECT

function toggleSelect(btn,index){

const card=btn.parentElement

if(selectedCards.includes(index)){

selectedCards=selectedCards.filter(i=>i!==index)
card.classList.remove('selected')

}
else{

selectedCards.push(index)
card.classList.add('selected')

}

}



// AI CHATBOT

async function askAI(){

const question=document.getElementById("ai-question").value

const context=allCards.map(item=>`

Questionnaire: ${item['Questionaire name']}
Target Age: ${item['Target age']}
Target Condition: ${item['Target condition']}
Purpose: ${item['Purpose of questionnaire']}

`).join("\n")

document.getElementById("ai-answer").innerHTML="AI thinking..."

const response=await fetch(

"https://ai-server-hub--nayshawadhawan.replit.app/api/ai",

{

method:"POST",
headers:{ "Content-Type":"application/json" },

body:JSON.stringify({

prompt:`

Use this questionnaire database:

${context}

User question:
${question}

Recommend the best questionnaires.

`

})

}

)

const data=await response.json()

document.getElementById("ai-answer").innerText=
data.reply || data.choices?.[0]?.message?.content

}

</script>

</body>
</html>
```
